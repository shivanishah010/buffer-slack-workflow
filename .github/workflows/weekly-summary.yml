name: Weekly Buffer Summary

on:
  schedule:
    # Runs every Friday at 10:30 IST (which is 05:00 UTC)
    # IST is UTC+5:30, so 10:30 IST = 05:00 UTC
    - cron: '0 5 * * 5'
  
  # Allows manual trigger for testing
  workflow_dispatch:

jobs:
  send-summary:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run weekly summary script
        env:
          BUFFER_API_TOKEN: ${{ secrets.BUFFER_API_TOKEN }}
          BUFFER_ORG_ID: ${{ secrets.BUFFER_ORG_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: npm test